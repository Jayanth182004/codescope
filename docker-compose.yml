version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: codescope_db
    environment:
      POSTGRES_USER: codescope_user
      POSTGRES_PASSWORD: codescope_secure_pass_387
      POSTGRES_DB: codescope_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codescope_user -d codescope_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codescope_backend
    environment:
      - DATABASE_URL=postgresql://codescope_user:codescope_secure_pass_387@db:5432/codescope_dev
      - SECRET_KEY=codescope_super_secret_signing_key_387d89f2e3c09b7
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: codescope_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
